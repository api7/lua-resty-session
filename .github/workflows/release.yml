name: Release

on:
  push:
    branches:
      - "master"
    paths:
      - 'rockspecs/**'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Lua
        uses: leafo/gh-actions-lua@v10

      - name: Install Luarocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Extract release name
        id: release_env
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          title="$COMMIT_MESSAGE"
          re="^feat: release v*(\S+)"
          if [[ $title =~ $re ]]; then
              echo "version=v${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
              echo "version_without_v=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
              echo "commit format is not correct"
              exit 1
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release_env.outputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
              echo "release $VERSION already exists, skipping"
          else
              gh release create "$VERSION" --title "$VERSION" --generate-notes
          fi

      - name: Upload to luarocks
        env:
          LUAROCKS_TOKEN: ${{ secrets.LUAROCKS_TOKEN }}
          VERSION_WITHOUT_V: ${{ steps.release_env.outputs.version_without_v }}
        run: |
          rockspec="rockspecs/api7-lua-resty-session-${VERSION_WITHOUT_V}-0.rockspec"
          if [[ ! -f "$rockspec" ]]; then
              echo "rockspec not found: $rockspec"
              exit 1
          fi
          luarocks install dkjson
          luarocks upload "$rockspec" --api-key="${LUAROCKS_TOKEN}"
